name: groicery_delivery
description: "A Flutter Android grocery delivery app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0
  flutter_upi_india: ^1.0.1

  # Location
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  shared_preferences: ^2.2.3
#  upi_india: ^3.0.1
  
  # Date formatting
  intl: ^0.19.0
  shimmer: ^3.0.0

  # Payment


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
